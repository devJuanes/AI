services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: matuai-api
    restart: unless-stopped
    environment:
      MATUDB_URL: ${MATUDB_URL:-https://db.matudb.com}
      MATUDB_PROJECT_ID: ${MATUDB_PROJECT_ID}
      MATUDB_SERVICE_KEY: ${MATUDB_SERVICE_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      API_PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-https://ai.matubyte.com}
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
