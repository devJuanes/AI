# ai.matubyte.com — Matu AI API + Dashboard
# Copia a /etc/nginx/sites-available/ai.matubyte.com y enlaza en sites-enabled

upstream matu_ai_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name ai.matubyte.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai.matubyte.com;

    # Certificados (Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/ai.matubyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.matubyte.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    # Dashboard (build: npm run build --workspace=dashboard)
    root /var/www/matu-ai/dashboard/dist;
    index index.html;

    location /api/ {
        proxy_pass http://matu_ai_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        proxy_pass http://matu_ai_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://matu_ai_api;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
