# chat.matubyte.com — Matu AI frontend (docs + dashboard + API keys)
# sudo cp deploy/nginx/chat.matubyte.com.conf /etc/nginx/sites-available/
# sudo ln -sf /etc/nginx/sites-available/chat.matubyte.com.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name chat.matubyte.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.matubyte.com;

    ssl_certificate     /etc/letsencrypt/live/chat.matubyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.matubyte.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/matu-ai/chat/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
