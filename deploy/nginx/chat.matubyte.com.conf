# chat.matubyte.com — frontend Vue (panel, chat, docs)

server {
    listen 80;
    listen [::]:80;
    server_name chat.matubyte.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.matubyte.com;

    ssl_certificate /etc/letsencrypt/live/matu-ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matu-ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/matu-ai/chat/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
