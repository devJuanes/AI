# chat.matubyte.com — Matu AI frontend (docs + dashboard)
# HTTP inicial; certbot --nginx añade SSL automáticamente

server {
    listen 80;
    listen [::]:80;
    server_name chat.matubyte.com;

    root /var/www/matu-ai/chat/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
