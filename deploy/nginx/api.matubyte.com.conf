# api.matubyte.com — Matu AI API (OpenAI-compatible + auth)
# sudo cp deploy/nginx/api.matubyte.com.conf /etc/nginx/sites-available/
# sudo ln -sf /etc/nginx/sites-available/api.matubyte.com.conf /etc/nginx/sites-enabled/

upstream matu_ai_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name api.matubyte.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.matubyte.com;

    ssl_certificate     /etc/letsencrypt/live/api.matubyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.matubyte.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    location / {
        proxy_pass http://matu_ai_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
